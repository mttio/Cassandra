[html]
allow_scripts = []
allow_origins = ["trusted.com"]
event_handlers = "info"

# [html.dangerous_domain]
# level = "info"
# replace = "#"

[urls]
dangerous_domains = [
  "malicious-domain.com",
  "evil.com",
]
idn = "warn"

[resources]
fetch_sub_resources = true
max_depth = 1
max_requests = { value = 5, level = "error" }
max_bytes = { value = 1048576, level = "error" }

[connections]
connection_timeout = "3s"
overall_timeout = "15s"
max_redirects = {
  value = 2,
  level = "error"
}
user_agent = "CoolBot/0.0 (https://example.org/coolbot/; coolbot@example.org) generic-library/0.0"
dangerous_domain = "error"
